services:
# POSTGRES DATABASE
  postgres:
    container_name: pgbball
    image: jdme-pg
    build: 
      context: dkr/db/.
      dockerfile: pg.Dockerfile
    env_file: 
      - .env
    networks:
      pgnet:
    ports:
      - "9876:5432"
    restart: unless-stopped
    volumes:
      - pg-data:/var/lib/postgresql/data
      - pg-dump:/var/lib/postgresql/dump

# DAILY STATS FETCH
  pgfetch:
    container_name: pgfetch
    depends_on: 
      postgres:
        condition: service_healthy
    image: jdme-pgfetch
    build: 
      context: dkr/db/.
      dockerfile: pgfetch/fetch.Dockerfile
    env_file: .env
    networks:
      pgnet:
    restart: unless-stopped
    volumes:
      - pg-dump:/dump
      - fetchlog:/app/log 
# MONGO DATABASE
  mongo:
    container_name: mongo
    image: jdme-mongo
    build:
      context: dkr/mongo/.
      dockerfile: mongo.Dockerfile
    env_file:
      - .env
    networks:
      lognet:
    ports:
      - "27017:27017"
    restart: always
    volumes:
      - mongo-data:/data/db
      - mongo-conf:/data/configdb

# MONGO EXPRESS UI
  mongox:
    container_name: mongox
    depends_on:
      mongo:
        condition: service_healthy
    image: jdme-mongox
    build:
      context: dkr/mongo/.
      dockerfile: mongox.Dockerfile
    env_file:
      - .env
    networks:
      lognet:
      apinet:
    ports:
      - "8081:8081"
    restart: unless-stopped
    
# GO API  
  api:
    container_name: api
    depends_on:
      mongo:
        condition: service_healthy
      postgres:
        condition: service_healthy
    image: jdme-api
    build:
      context: .
      dockerfile: api.Dockerfile
    env_file:
      - .env
    networks:
      apinet:
      lognet: 
      pgnet:
    ports: 
      - "8080:8080"
    restart: unless-stopped
    volumes:
      - applog:/app/z_log/app
      - applog_dbg:/app/z_log/dbg
      - appdata:/app/persist

  pgis: 
    container_name: pgis
    image: mrp-postgis
    build:
        context: ./stl-transit
        dockerfile: ./db/Dockerfile
    env_file:
        - ./stl-transit/.env
    ports: 
        - "6543:5432"
    networks:
      pgnet:
    volumes: 
        - postgis_data:/var/lib/postgresql
        - ./stl-transit/db/initdb:/docker-entrypoint-initdb.d:ro
        - ./stl-transit/db/initdb/gis_260315_163733.dump:/dump/db.dump
        - ./stl-transit/db/postgresql.conf:/etc/postgresql/postgresql.conf:ro
        - /etc/timezone:/etc/timezone:ro
        - /etc/localtime:/etc/localtime:ro
    command: [ "postgres", "-c", "config_file=/etc/postgresql/postgresql.conf" ]
  mrp:
    container_name: mrp
    depends_on:
      pgis:
        condition: service_healthy
    image: jdme-mrp
    build:
      context: ./stl-transit
      dockerfile: Dockerfile
    networks:
      apinet:
      pgnet:
    env_file:
      - ./stl-transit/.env
    ports:
      - "9999:9999"
    restart: unless-stopped

# REVERSE PROXY
  nginx:
    container_name: nginx
    build:
      context: .
      dockerfile: dkr/nginx/nginx.Dockerfile
    image: jdme-nginx
    depends_on:
      api:
        condition: service_healthy
      mongox:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      apinet:
      lognet:
      cfnet:
    restart: unless-stopped
    volumes:
      - ./dkr/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - proxylog:/var/log/nginx
      - www:/var/www
      - cvpublic:/var/hugocv
      - ./stl-transit/www/index.html:/var/mrp/index.html:ro
      - ./stl-transit/www/about.html:/var/mrp/about.html:ro
      - ./stl-transit/www/css:/var/mrp/css:ro
      
  cloudflared:
    container_name: cf
    build:
      context: dkr/cloudflare/.
      dockerfile: cf.Dockerfile
    env_file:
      - .env
    image: jdme-cloudflared
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    networks:
      cfnet:
    volumes:
      - ./dkr/cloudflare/conf:/etc/cloudflared

# NETWORKS
networks:
  apinet: 
    name: apinet
    driver: bridge

  lognet:
    name: lognet
    driver: bridge

  pgnet:
    name: pgnet
    driver: bridge

  cfnet:
    name: cfnet
    driver: bridge

# VOLUMES
volumes:
  pg-data:
    name: pg-data
  pg-dump:
    name: pg-dump   
  fetchlog:
    name: fetchlog
  mongo-data:
    name: mongo-data
  mongo-conf:
    name: mongo-conf
  applog:
    name: applog
  applog_dbg:
    name: applog_dbg
  appdata: 
    name: appdata
  app_static:
    name: app_static
  proxylog:
    name: proxylog
  www:
    name: www
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./www
  cvpublic: 
    name: cvpublic
  cvsrc:
    name: cvsrc
  postgis_data: